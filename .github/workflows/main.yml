name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Déclenchement automatique sur push
  workflow_dispatch:   # Déclenchement manuel depuis GitHub

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
